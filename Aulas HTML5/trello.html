<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

</head>
<body>

  <img src="img/trello.svg" alt="" width="300">

  <h1>Fazer login no Trello</h1>
  <form action="">
    <input type="text" name="email" placeholder="Insira o e-mail"> 
    <input type="password" name="senha" placeholder="Insira a senha"> 
    <button>Fazer login</button>
  </form>
  
   <span>Ou</span> 
  

  <Button>
    <img src="img/google.svg" alt=""> Continuar com o Google
  </Button>
  
  <button>
    <img src="img/microsoft.svg" alt=""> Continuar com a Microsoft
  </button>
  
  <button>
    <img src="img/apple.svg" alt="" width="20"> Continuar com a Apple
  </button>
  
  <button>
    <img src="img/slack.svg" alt="" width="20"> Continuar com o Slack
  </button>
  
  <img src="img/atlassian.svg" alt="" width="200">
  <img src="img/analytics.svg" alt="" width="200">
  <img src="img/interactive.svg" alt="" width="200">
</body>
</html>
