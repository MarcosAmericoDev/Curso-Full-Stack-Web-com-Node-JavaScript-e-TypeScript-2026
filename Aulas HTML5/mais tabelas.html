<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>

    <h1>Mais sobre tabelas</h1>
    <table border="1">
        <caption>Listagem de Produtos</caption>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Notebook</td>
                <td>R$3000</td>
                <td rowspan="2">20%</td>
            </tr>
            <tr>
                <td>Celular</td>
                <td>R$3000</td>
            </tr> 
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td colspan="2">R$6000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
