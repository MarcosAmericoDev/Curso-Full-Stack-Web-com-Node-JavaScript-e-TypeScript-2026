<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas ordenadas e não ordenadas</title>
</head>
<body>
    <!--
        ul
        ol
        li
    -->
    <h2>Lista não ordenadas (Menus)</h2>
    <ul>
        <li>Veículo</li>
        <li>
            Tecnologia
            <ul>
                <li>Celulares e telefones</li>
                <li>Câmeras e acessórios</li>
            </ul>
        </li>
    </ul>

    <h2>Lista ordenada (lista de compras)</h2>
    <ol>
        <li>Melancia</li>
        <li>Macarrão</li>
        <li>
            Hamburguer
            <ol>
                <li>Pão</li>
                <li>Carne</li>
                <li>Queijo</li>
            </ol>
        </li>
    </ol>
</body>
</html>
