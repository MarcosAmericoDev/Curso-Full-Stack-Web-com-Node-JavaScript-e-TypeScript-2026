<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais sobre Formulários</title>
</head>
<body>
    <h1>Mais sobre Formulários</h1>
    <form action="processa.html" method="get">

        <h2>Label</h2>
        <label>
            Nome:
            <input type="text" name="nome">
        </label>

        <br>

        <label for="email">Email:</label> <!--Essa é a forma mais recomendada hoje ao invés na de cima -->
        <input type="text" name="email" id="email">

        Gênero <br>
        <input type="radio" name="genero" value="feminino" id="feminino"> <label for="feminino">Feminino</label>
        <input type="radio" name="genero" value="masculino" id="masculino"> <label for="masculino">Masculino</label>
        <br>
        <input type="radio" name="tipo" value="feminino" id="web"> <label for="web">Web</label>
        <input type="radio" name="tipo" value="masculino" id="app"> <label for="app">App</label>
                
        <br><br>Estilo musical <br>

        <input type="checkbox" name="estilo" value="rock"> Rocks

        <br><br>

        Estado:
        <select name="estado">
            <option value="">Selecione...</option>
            <option value="ce">Ceará</option>
            <option value="sp">São Paulo</option>
            <option value="rj">Rio de Janeiro</option>
            <option value="mg">Minas Gerais</option>
        </select>

        <br><br>

        Upload
        <input type="file"> <!--usar metodo post obrigatorio-->

        <br><br>
        <br><br>
        <input type="submit" name="cadastrar">
    </form>

    <br>
    <form action="">
        <fieldset>
            <legend>Dados pessoais</legend>
            <label for="email">Email:</label> <!--Essa é a forma mais recomendada hoje ao invés na de cima -->
            <input type="text" name="email" id="email">
        </fieldset>
    </form>
</body>
</html>
