<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin e Padding</title>

    <style>
        #topo {
            border: 1px solid orange;
            width: 900px;
            margin: 10px auto;
        }
        h1 {
            border: 1px solid red;
            padding: 40px;
            margin: 10px;
        }
        p {
            border: 1px solid blue;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="topo">
        <h1>Esse é um título de exemplo</h1>
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam ipsam optio vel? Quidem quo iusto esse eos harum animi error ratione deleniti quas, dolorum numquam ducimus delectus, eveniet nobis dolorem!
        </p>

    </div>

</body>
</html>
