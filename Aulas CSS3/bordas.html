<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordas</title>

    <style>
        h1 {
            background-color: orange;
            font-size: 70px;
            padding: 15px;
            margin: 15px;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
            border-bottom-style: dotted;
            border-width: 10px;
        }
        p {
            background-color: cornflowerblue;
            font-size: 40px;
            padding: 15px;
            margin-left: 15px;
            margin-right: 15px;
            border-radius: 40px;
            border-left-color: darkslateblue;
            border-left-style: solid;
            border-left-width: 20px;
            border-right: 20px solid darkslateblue;
        }
    </style>
</head>
<body>
    <h1>Esse é um título de exemplo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam ipsam optio vel? Quidem quo iusto esse eos harum animi error ratione deleniti quas, dolorum numquam ducimus delectus, eveniet nobis dolorem!</p>

</body>
</html>
